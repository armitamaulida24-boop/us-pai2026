            document.addEventListener("visibilitychange", handleVisibilityChange);
            return () => document.removeEventListener("visibilitychange", handleVisibilityChange);

            e.preventDefault();
            if (!student.nama.trim()) {
              setErrorMsg('Nama lengkap wajib diisi!');

              setErrorMsg('Token ujian salah! Silakan periksa kembali.');

            document.documentElement.requestFullscreen().catch((err) => {
              console.log("Fullscreen ditolak:", err);
            });

            setAnswers({ ...answers, [qIndex]: optIndex });

            let analisisSoal = [];

                score += 2;
                analisisSoal.push(1); 
              } else {
                analisisSoal.push(0); 
              }
              jawabanHuruf.push(ansIdx !== undefined ? opsiHuruf[ansIdx] : '-'); 
            });
            
            score = score - (cheatCount * 2);
            score = Math.max(0, score);
            setFinalScore(score);

              jenisKelamin: student.jk,
              kelas: student.kelas,

              jawabanHuruf: jawabanHuruf, 
              analisis: analisisSoal      
            };

                  </div>
                  <p className="text-sm text-gray-400">Silahkan tutup halaman ini atau kembalikan perangkat kepada pengawas.</p>
                </div>
              </div>
            );
          }

          return (
            <div className="flex flex-col md:flex-row h-screen bg-gray-50 font-sans">
              {showCheatWarning && (
                <div className="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50 p-4">
                  <div className="bg-white p-8 rounded-xl shadow-2xl max-w-sm text-center border-t-8 border-red-600">
                    <h2 className="text-2xl font-bold text-red-600 mb-2">PERINGATAN!</h2>
                    <p className="text-gray-700 mb-6">Anda terdeteksi meninggalkan halaman ujian. Kecurangan ke-{cheatCount} telah dicatat dan akan mengurangi nilai akhir.</p>
                    <button onClick={() => setShowCheatWarning(false)} className="bg-red-600 text-white px-6 py-2 rounded-md font-bold hover:bg-red-700">Saya Mengerti</button>
                  </div>
                </div>
              )}

              {showConfirmSubmit && (
                <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
                  <div className="bg-white p-6 rounded-xl shadow-xl max-w-sm text-center">
                    <h2 className="text-xl font-bold text-gray-800 mb-2">Kirim Jawaban?</h2>
                    <p className="text-gray-600 mb-6">Pastikan semua soal telah dijawab. Anda tidak bisa kembali setelah menekan tombol kirim.</p>
                    <div className="flex justify-center space-x-4">
                      <button onClick={() => setShowConfirmSubmit(false)} className="px-4 py-2 border border-gray-300 rounded text-gray-600 font-semibold hover:bg-gray-100" disabled={isSubmitting}>Batal</button>
                      <button onClick={submitExam} className="px-4 py-2 bg-green-600 rounded text-white font-semibold hover:bg-green-700 flex items-center" disabled={isSubmitting}>
                        {isSubmitting ? "Mengirim..." : "Ya, Kirim Sekarang"}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              <div className="flex-1 p-4 md:p-8 flex flex-col h-screen overflow-y-auto">
                <div className="bg-white rounded-lg shadow-sm p-4 mb-4 flex justify-between items-center border-b-4 border-green-600">
                  <div className="flex items-center space-x-4">
                    <img src={SCHOOL_LOGO_URL} alt="Logo Sekolah" className="w-12 h-12 object-contain hidden sm:block drop-shadow-sm" />
                    <div>
                      <h2 className="font-bold text-gray-800">{student.nama} - Kelas {student.kelas}</h2>
                      <p className="text-xs text-gray-500">Pendidikan Agama Islam</p>
                    </div>
                  </div>
                  <div className="text-right">
                    <span className="bg-red-100 text-red-800 text-xs font-semibold px-2 py-1 rounded">
                      Peringatan: {cheatCount}x
                    </span>
                  </div>
                </div>

                <div className="bg-white rounded-lg shadow-md p-6 flex-1">
                  {QUESTIONS.map((q, index) => (
                    <div key={q.id} id={`soal-${index}`} className="mb-10 border-b pb-6 last:border-0">
                      <div className="flex space-x-4 mb-4">
                        <span className="font-bold text-lg">{index + 1}.</span>
                        <div className="flex-1">
                          {q.imageUrl && <img src={q.imageUrl} alt="Ilustrasi Soal" className="mb-4 max-w-full h-auto rounded border" />}
                          <p className="text-gray-800 leading-relaxed whitespace-pre-wrap">{q.text}</p>
                        </div>
                      </div>
                      <div className="pl-8 space-y-2">
                        {q.options.map((opt, optIndex) => (
                          <label key={optIndex} className={`flex items-start space-x-3 p-3 rounded-lg border cursor-pointer transition-colors ${answers[index] === optIndex ? 'bg-green-50 border-green-500' : 'hover:bg-gray-50 border-gray-200'}`}>
                            <input type="radio" name={`question-${index}`} className="mt-1 w-4 h-4 text-green-600 focus:ring-green-500" checked={answers[index] === optIndex} onChange={() => handleAnswer(index, optIndex)} />
                            <span className="text-gray-700 whitespace-pre-wrap">{opt}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="w-full md:w-80 bg-white border-l shadow-lg flex flex-col h-screen hidden md:flex">
                <div className="p-4 bg-gray-800 text-white text-center">
                  <h3 className="font-bold">Navigasi Soal</h3>
                  <p className="text-xs text-gray-300">Total: 50 Soal</p>
                </div>
                <div className="flex-1 p-4 overflow-y-auto">
                  <div className="grid grid-cols-5 gap-2">
                    {QUESTIONS.map((_, i) => {
                      const isAnswered = answers[i] !== undefined;
                      return (
                        <button key={i} onClick={() => document.getElementById(`soal-${i}`).scrollIntoView({ behavior: 'smooth' })} className={`w-10 h-10 rounded text-sm font-bold border transition ${isAnswered ? 'bg-green-500 text-white border-green-600' : 'bg-gray-100 text-gray-600 border-gray-300 hover:bg-gray-200'}`}>
                          {i + 1}
                        </button>
                      );
                    })}
                  </div>
                </div>
                <div className="p-4 border-t bg-gray-50">
                  <button onClick={() => setShowConfirmSubmit(true)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded shadow transition">
                    KIRIM JAWABAN
                  </button>
                </div>
              </div>

              <div className="md:hidden fixed bottom-0 left-0 right-0 p-4 bg-white border-t shadow-lg">
                <button onClick={() => setShowConfirmSubmit(true)} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded shadow transition">
                  KIRIM JAWABAN
                </button>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
